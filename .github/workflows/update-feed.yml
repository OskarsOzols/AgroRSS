name: Update RSS Feed

on:
  schedule:
    - cron: '*/30 * * * *'   # Ik pa 30 minūtēm
  workflow_dispatch: {}       # Manuāla palaišana

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          FACEBOOK_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
          FEED_URL: ${{ vars.FEED_URL }}
        run: python scraper.py

      - name: Commit and push feed.xml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/feed.xml
          git diff --staged --quiet || (git commit -m "Update RSS feed [$(date -u +%Y-%m-%dT%H:%M:%SZ)]" && git push)
